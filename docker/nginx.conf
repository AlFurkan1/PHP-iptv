server {
    listen 80;
    server_name _;
    root /var/www/iptv;
    index index.php;

    # Redirect /iptv/ prefix to root (client URL normalization)
    location ~ ^/iptv(/.*|$) {
        return 301 $1;
    }

    # Deny sensitive directories
    location ~ ^/(includes|bin|cache)/ { deny all; }
    location ~ \.(env|sql|md)$        { deny all; }
    autoindex off;

    # Gzip for faster delivery
    gzip on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types text/plain application/x-mpegURL video/mp2t application/vnd.apple.mpegurl;

    # TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Direct CDN proxy ??? serves HLS segments/keys without PHP overhead
    resolver 127.0.0.11 valid=30s ipv6=off;
    location ~ ^/cdn/(https?)/([^/]+)(/.*) {
        set $backend_proto  $1;
        set $backend_host   $2;
        set $backend_path   $3$is_args$args;
        proxy_pass          $backend_proto://$backend_host$backend_path;
        proxy_set_header    Host $backend_host;
        proxy_set_header    User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_ssl_verify    off;
        proxy_ssl_server_name on;
        proxy_read_timeout  30;
        proxy_buffering     on;
        proxy_buffers       32 256k;
        proxy_buffer_size   256k;
        proxy_busy_buffers_size 1m;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        add_header          Access-Control-Allow-Origin "*";
    }

    # PHP-FPM ??? increase buffers for HLS proxy
    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering on;
        fastcgi_buffer_size 256k;
        fastcgi_buffers 16 256k;
        fastcgi_busy_buffers_size 512k;
        fastcgi_temp_file_write_size 512k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # HLS proxy requests ??? enable cache
    location ~ ^/api/proxy\.php {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering on;
        fastcgi_buffer_size 256k;
        fastcgi_buffers 32 256k;
        fastcgi_busy_buffers_size 1m;
        fastcgi_temp_file_write_size 1m;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
    }

    # Live HLS streams from MediaMTX (cache-bypass internal)
    location /live/ {
        proxy_pass http://mediamtx:8888/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie "cookieCheck=1";
        proxy_read_timeout 60;
        add_header Access-Control-Allow-Origin "*";
    }

    location / { try_files $uri $uri/ /index.php?$args; }
}

